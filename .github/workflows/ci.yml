# Builds every chapter snapshot on every push, so no chapter ever rots.
# Chapters are discovered dynamically: adding code/ch16/ requires no CI edits.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  discover:
    name: Discover chapters
    runs-on: ubuntu-latest
    outputs:
      chapters: ${{ steps.list.outputs.chapters }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          chapters=$(find code -mindepth 1 -maxdepth 1 -type d -name 'ch*' -printf '%f\n' \
            | sort | jq -R . | jq -sc .)
          echo "chapters=$chapters" >> "$GITHUB_OUTPUT"
          echo "Found chapters: $chapters"

  build:
    name: Build ${{ matrix.chapter }}
    needs: discover
    if: needs.discover.outputs.chapters != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chapter: ${{ fromJSON(needs.discover.outputs.chapters) }}
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # raylib is compiled from source by naylib and needs the usual
      # windowing/audio dev headers (list mirrors naylib's own CI).
      - name: Install raylib system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev \
            libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev

      - name: Build
        working-directory: code/${{ matrix.chapter }}
        run: nimble build -Y

      # Some chapters ship extra runnable material (e.g. ch02's language
      # tour). Pure-stdlib, so plain `nim c` suffices.
      - name: Build language tour (if present)
        working-directory: code/${{ matrix.chapter }}
        run: |
          if [ -f src/tour.nim ]; then
            nim c --outdir:bin src/tour.nim
          fi

      # From ch08 on, chapters carry headless tests: the real systems,
      # no window, no GPU — which is why they can run right here.
      - name: Run tests (if present)
        working-directory: code/${{ matrix.chapter }}
        run: |
          if [ -d tests ]; then
            nimble test -Y
          fi

  # Every chapter carries its own copy of assets/ so it is standalone.
  # This job makes sure no copy drifts from the canonical top-level assets/:
  # re-running the sync must leave the working tree untouched.
  assets-in-sync:
    name: Chapter assets in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          tools/sync_assets.sh
          if [ -n "$(git status --porcelain -- 'code/*/assets')" ]; then
            echo "::error::chapter assets out of sync — run tools/sync_assets.sh and commit"
            git status --porcelain -- 'code/*/assets'
            exit 1
          fi
