# Builds the finished game (code/ch17) for the web and publishes it to
# GitHub Pages on every push to main. One-time setup on a fresh fork
# (the workflow token isn't allowed to do it for you): repository
# Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# After that, every push updates the URL you send to your friends.
name: Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GAME_DIR: code/ch17

jobs:
  build:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Pinned to the version the web build was developed against.
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2

      - uses: actions/configure-pages@v5

      - name: Install dependencies, generate nimble.paths
        working-directory: ${{ env.GAME_DIR }}
        run: nimble setup -Y

      - name: Build for the web
        working-directory: ${{ env.GAME_DIR }}
        run: nim c -d:emscripten -d:release src/crypt_of_nimrod.nim

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.GAME_DIR }}/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
